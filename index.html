<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance — Club de Tiro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Condensed:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #f0f3f8;
  --bg2: #ffffff;
  --bg3: #e8edf5;
  --border: #d0d8e8;
  --navy: #1a3a6c;
  --navy2: #243b5e;
  --accent2: #e8956d;
  --text: #2c3e50;
  --muted: #7f8fa6;
  --white: #ffffff;
  --red: #e74c3c;
  --green: #27ae60;
  --warn: #e67e22;
  --light-blue: #B5D4F4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"IBM Plex Sans",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* LOGIN */
#login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, #0d1e3a 0%, #1a3a6c 100%);
}
.login-card {
  background:white; border-radius:8px; padding:48px 40px;
  text-align:center; width:360px; box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.login-logo {
  font-family:"IBM Plex Sans Condensed",sans-serif; font-size:24px;
  font-weight:700; color:var(--navy); letter-spacing:0.05em; text-transform:uppercase;
}
.login-logo span { color:var(--accent2); }
.login-sub {
  font-family:"IBM Plex Mono",monospace; font-size:11px;
  color:var(--muted); letter-spacing:0.08em; margin-top:4px; margin-bottom:32px;
}
.login-divider { height:1px; background:var(--border); margin:24px 0; }
.login-error {
  font-size:13px; color:var(--red); margin-top:16px;
  padding:10px; background:#fdf2f2; border-radius:4px; display:none;
}

/* HEADER */
.header {
  background:var(--navy); border-bottom:3px solid var(--accent2);
  padding:12px 28px; display:flex; align-items:center; justify-content:space-between;
}
.header-logo {
  font-family:"IBM Plex Sans Condensed",sans-serif; font-size:20px;
  font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:white;
}
.header-logo span { color:var(--accent2); }
.header-sub {
  font-family:"IBM Plex Mono",monospace; font-size:10px;
  color:rgba(255,255,255,0.45); letter-spacing:0.08em; margin-top:2px;
}
.header-right { display:flex; align-items:center; gap:16px; }
.user-info {
  font-family:"IBM Plex Mono",monospace; font-size:11px;
  color:rgba(255,255,255,0.6); text-align:right;
}
.user-codigo { color:var(--accent2); font-weight:600; font-size:13px; }
.btn-logout {
  font-family:"IBM Plex Sans Condensed",sans-serif; font-size:12px;
  font-weight:600; padding:6px 14px; border:1px solid rgba(255,255,255,0.3);
  background:transparent; color:rgba(255,255,255,0.6); cursor:pointer;
  transition:all 0.2s; border-radius:3px;
}
.btn-logout:hover { color:white; border-color:white; }

.nav { display:flex; gap:4px; }
.nav-btn {
  font-family:"IBM Plex Sans Condensed",sans-serif; font-size:13px; font-weight:600;
  letter-spacing:0.04em; text-transform:uppercase; padding:7px 18px;
  border:1px solid rgba(255,255,255,0.2); background:transparent; color:rgba(255,255,255,0.6);
  cursor:pointer; transition:all 0.2s;
}
.nav-btn:hover { color:white; border-color:white; }
.nav-btn.active { background:var(--accent2); color:white; border-color:var(--accent2); }

/* MAIN */
#app-screen { display:none; }
.main { padding:24px 28px; margin:0 auto; }
.page { display:none; }
.page.active { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

.section-title {
  font-family:"IBM Plex Mono",monospace; font-size:11px; font-weight:600;
  letter-spacing:0.12em; text-transform:uppercase; color:var(--muted);
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.section-title::after { content:""; flex:1; height:1px; background:var(--border); }

.grid-2 { display:grid; grid-template-columns:240px 1fr; gap:20px; }

/* SESIONES */
.sesion-item {
  padding:10px 12px; border:1px solid var(--border); border-left:3px solid transparent;
  cursor:pointer; transition:all 0.15s; margin-bottom:5px; background:var(--bg2);
  border-radius:3px;
}
.sesion-item:hover { border-left-color:var(--accent2); background:#f8fafd; }
.sesion-item.active { border-left-color:var(--navy); background:#eef3fb; }
.sesion-fecha { font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--navy); font-weight:600; }
.sesion-nombre { font-family:"IBM Plex Sans Condensed",sans-serif; font-size:14px; font-weight:700; color:var(--text); margin-top:2px; }
.badge { font-family:"IBM Plex Mono",monospace; font-size:10px; padding:2px 7px; border-radius:2px; display:inline-block; margin-top:3px; }
.badge-mojado { color:#c0552a; background:#fde8da; }
.badge-seco { color:#1a5276; background:#d6eaf8; }

/* PLANILLA */
.planilla-wrap { overflow-x:auto; }
table.planilla {
  border-collapse:collapse; font-size:12px; width:100%;
  background:white; border-radius:4px; overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.08); table-layout:fixed;
}
table.planilla th { padding:6px 8px; text-align:center; border:1px solid var(--border); }
th.ej-main {
  background:var(--navy); color:var(--light-blue);
  font-family:"IBM Plex Sans Condensed",sans-serif; font-size:12px; font-weight:700;
  white-space:normal; word-break:break-word; vertical-align:top; line-height:1.3; width:90px;
}
th.ej-desc { display:block; font-size:9px; font-weight:400; color:rgba(255,255,255,0.6); margin-top:3px; white-space:normal; line-height:1.3; }
th.ej-exig { background:var(--accent2); color:white; font-family:"IBM Plex Mono",monospace; font-size:10px; font-weight:600; }
th.target-header { background:var(--bg3); color:var(--navy2); font-family:"IBM Plex Mono",monospace; font-size:10px; font-weight:600; width:50px; }
th.jugador-header { background:var(--navy2); color:white; font-family:"IBM Plex Sans Condensed",sans-serif; font-size:12px; font-weight:700; text-align:left; width:55px; }
table.planilla td { padding:6px 8px; border:1px solid #edf0f5; text-align:center; font-family:"IBM Plex Mono",monospace; font-size:12px; }
td.jugador-cell { font-family:"IBM Plex Sans Condensed",sans-serif; font-size:14px; font-weight:700; color:var(--navy); text-align:left; background:#f8fafd; white-space:nowrap; }
table.planilla tr:nth-child(even) td { background:#fafbfd; }
table.planilla tr:nth-child(even) td.jugador-cell { background:#f0f4fa; }
table.planilla tr:hover td { background:#eef6ff !important; }
.val-ok { color:var(--green); font-weight:700; }
.val-warn { color:var(--warn); font-weight:700; }
.val-bad { color:var(--red); font-weight:600; }
.val-empty { color:#ccc; }

/* JUGADORES */
.jugador-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(60px,1fr)); gap:5px; margin-bottom:20px; }
.jugador-btn {
  font-family:"IBM Plex Sans Condensed",sans-serif; font-size:14px; font-weight:700;
  padding:9px 5px; border:1px solid var(--border); background:var(--bg2);
  color:var(--muted); cursor:pointer; text-align:center; transition:all 0.15s; border-radius:3px;
}
.jugador-btn:hover { border-color:var(--navy); color:var(--navy); }
.jugador-btn.active { background:var(--navy); color:white; border-color:var(--navy); }

/* HISTORIAL */
.historial-ej { border:1px solid var(--border); margin-bottom:7px; border-radius:4px; overflow:hidden; background:white; }
.historial-ej-header { padding:9px 14px; display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border-bottom:1px solid var(--border); }
.historial-fecha { font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--navy); font-weight:600; }
.historial-tipo { font-family:"IBM Plex Sans Condensed",sans-serif; font-size:14px; font-weight:700; color:var(--text); }
.historial-ej-body { padding:11px 14px; display:flex; gap:18px; align-items:center; }
.historial-score { font-family:"IBM Plex Sans Condensed",sans-serif; font-size:34px; font-weight:700; line-height:1; min-width:75px; }
.historial-score.ok { color:var(--green); }
.historial-score.bad { color:var(--red); }
.historial-score.warn { color:var(--warn); }
.historial-desc { font-size:13px; color:var(--muted); flex:1; line-height:1.4; }
.historial-exig { font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted); margin-top:5px; }

/* STATS */
.stat-row { display:flex; gap:10px; margin-bottom:18px; }
.stat-box { background:white; border:1px solid var(--border); padding:12px 18px; flex:1; border-radius:4px; border-top:3px solid var(--border); }
.stat-box.green { border-top-color:var(--green); }
.stat-box.orange { border-top-color:var(--warn); }
.stat-box.navy { border-top-color:var(--navy); }
.stat-val { font-family:"IBM Plex Sans Condensed",sans-serif; font-size:32px; font-weight:700; color:var(--text); }
.stat-lbl { font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:0.05em; }
.stat-val.green { color:var(--green); }
.stat-val.orange { color:var(--warn); }

.loading { text-align:center; padding:50px; font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--muted); }
.empty-msg { padding:40px; text-align:center; font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Club de Tiro // <span>Performance</span></div>
    <div class="login-sub">SISTEMA DE ANÁLISIS TÁCTICO · 2026</div>
    <div class="login-divider"></div>
    <div id="g_id_onload"
      data-client_id="212701944710-iahvd45fa59qtvgg4ujt8q69qohocd2i.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_select="true">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-shape="rectangular"
      data-logo_alignment="left">
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header class="header">
    <div>
      <div class="header-logo">Club de Tiro // <span>Performance</span></div>
      <div class="header-sub">SISTEMA DE ANÁLISIS TÁCTICO · 2026</div>
    </div>
    <div class="header-right">
      <nav class="nav">
        <button class="nav-btn active" onclick="showPage('sesiones', this)">Sesiones</button>
        <button class="nav-btn" onclick="showPage('jugadores', this)">Jugadores</button>
      </nav>
      <div class="user-info">
        <div class="user-codigo" id="user-codigo"></div>
        <div id="user-email"></div>
      </div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>

  <main class="main">
    <div class="page active" id="page-sesiones">
      <div class="grid-2">
        <div>
          <div class="section-title">Sesiones</div>
          <div id="lista-sesiones"><div class="loading">Cargando</div></div>
        </div>
        <div>
          <div class="section-title">Resultados</div>
          <div id="detalle-sesion"><div class="empty-msg">← Selecciona una sesión</div></div>
        </div>
      </div>
    </div>

    <div class="page" id="page-jugadores">
      <div class="section-title">Seleccionar Jugador</div>
      <div id="jugadores-grid"><div class="loading">Cargando</div></div>
      <div id="historial-jugador"></div>
    </div>
  </main>
</div>

<script>
var APPS_SCRIPT_URL = "https://script.google.com/a/macros/dorcocapital.com/s/AKfycbzHULqhWTuJPuCsaHpfnXj8t2X0sFB3IufY2cjc9nJXp_2o1yfS-4EJFSo85cB8sBo/exec";
var currentUser = null;

// ── AUTH ──
function handleCredentialResponse(response) {
  var payload = parseJwt(response.credential);
  var email = payload.email;
  validateUser(email, payload.name);
}

function parseJwt(token) {
  var base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(atob(base64));
}

function validateUser(email, name) {
  fetch(APPS_SCRIPT_URL + "?action=validateUser&email=" + encodeURIComponent(email))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        currentUser = data.user;
        localStorage.setItem("performance_user", JSON.stringify(currentUser));
        showApp();
      } else {
        showError("Tu cuenta (" + email + ") no tiene acceso a este dashboard.");
      }
    })
    .catch(function() {
      showError("Error de conexión. Intenta de nuevo.");
    });
}

function showError(msg) {
  var el = document.getElementById("login-error");
  el.textContent = msg;
  el.style.display = "block";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";
  document.getElementById("user-codigo").textContent = currentUser.codigo || currentUser.nombre;
  document.getElementById("user-email").textContent = currentUser.email;
  loadSesiones();
  loadJugadores();
}

function logout() {
  localStorage.removeItem("performance_user");
  currentUser = null;
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app-screen").style.display = "none";
  google.accounts.id.disableAutoSelect();
}

// Auto-login si hay sesión guardada
window.onload = function() {
  var saved = localStorage.getItem("performance_user");
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      showApp();
    } catch(e) {
      localStorage.removeItem("performance_user");
    }
  }
};

// ── NAVEGACIÓN ──
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
}

// ── API ──
function apiCall(endpoint) {
  return fetch(APPS_SCRIPT_URL + "?action=" + endpoint)
    .then(function(r) { return r.json(); });
}

function apiCallWithParam(endpoint, param, value) {
  return fetch(APPS_SCRIPT_URL + "?action=" + endpoint + "&" + param + "=" + encodeURIComponent(value))
    .then(function(r) { return r.json(); });
}

// ── SESIONES ──
function loadSesiones() {
  apiCall("getSesiones")
    .then(function(data) {
      var cont = document.getElementById('lista-sesiones');
      if (!data.sesiones || data.sesiones.length === 0) {
        cont.innerHTML = '<div class="loading">Sin sesiones</div>';
        return;
      }
      cont.innerHTML = data.sesiones.map(function(s) {
        var isMojado = (s.tipo || '').toLowerCase().includes('mojado');
        var badgeClass = isMojado ? 'badge-mojado' : 'badge-seco';
        return '<div class="sesion-item" onclick="loadDetalleSesion(\'' + s.id + '\', this)">' +
          '<div class="sesion-fecha">' + s.fecha + '</div>' +
          '<div class="sesion-nombre">' + s.tipo + ' · ' + s.grupo + '</div>' +
          '<span class="badge ' + badgeClass + '">' + (s.tipo || '') + '</span>' +
          '</div>';
      }).join('');
    })
    .catch(function(err) {
      document.getElementById('lista-sesiones').innerHTML = '<div class="loading">Error cargando sesiones</div>';
    });
}

function loadDetalleSesion(idSesion, el) {
  document.querySelectorAll('.sesion-item').forEach(function(e) { e.classList.remove('active'); });
  el.classList.add('active');
  var cont = document.getElementById('detalle-sesion');
  cont.innerHTML = '<div class="loading">Cargando resultados</div>';
  apiCallWithParam("getSesionDetalle", "idSesion", idSesion)
    .then(function(data) { cont.innerHTML = renderPlanilla(data); })
    .catch(function() { cont.innerHTML = '<div class="loading">Error cargando resultados</div>'; });
}

function renderPlanilla(data) {
  if (!data.ejercicios || data.ejercicios.length === 0) {
    return '<div class="empty-msg">Sin ejercicios registrados</div>';
  }

  var ejercicios = data.ejercicios;
  var targetsMap = data.targetsMap || {};
  var resultadosEjMap = data.resultadosEjMap || {};
  var resultadosTarMap = data.resultadosTarMap || {};
  var mapaEq = data.mapaEq || {};

  var emailsSet = {};
  ejercicios.forEach(function(ej) {
    (resultadosEjMap[ej.id] || []).forEach(function(r) { emailsSet[r.email] = true; });
  });
  var emails = Object.keys(emailsSet).sort(function(a, b) {
    return (mapaEq[a] || a).localeCompare(mapaEq[b] || b);
  });

  var html = '<div class="planilla-wrap"><table class="planilla">';

  html += '<tr><th class="jugador-header" rowspan="3">Jug.</th>';
  ejercicios.forEach(function(ej) {
    var targets = targetsMap[ej.id] || [];
    var cols = targets.length || 1;
    html += '<th class="ej-main" colspan="' + cols + '">Ej ' + ej.numero + ' · ' + (ej.distancia || '') + 'm<span class="ej-desc">' + (ej.descripcion || '') + '</span></th>';
  });
  html += '</tr>';

  html += '<tr>';
  ejercicios.forEach(function(ej) {
    var targets = targetsMap[ej.id] || [];
    var cols = targets.length || 1;
    var exigNum = ej.exigPct ? Math.round((ej.ammo || 0) * parseFloat(ej.exigPct)) : '—';
    var exigPct = ej.exigPct ? Math.round(parseFloat(ej.exigPct) * 100) + '%' : '';
    html += '<th class="ej-exig" colspan="' + cols + '">' + exigNum + '/' + (ej.ammo || '') + ' · ' + exigPct + '</th>';
  });
  html += '</tr>';

  html += '<tr>';
  ejercicios.forEach(function(ej) {
    var targets = targetsMap[ej.id] || [];
    if (targets.length === 0) {
      html += '<th class="target-header">Total</th>';
    } else {
      targets.forEach(function(tar) {
        html += '<th class="target-header">' + (tar.tipo || 'Total') + '</th>';
      });
    }
  });
  html += '</tr>';

  emails.forEach(function(email) {
    var codigo = mapaEq[email] || email;
    html += '<tr><td class="jugador-cell">' + codigo + '</td>';
    ejercicios.forEach(function(ej) {
      var resArr = resultadosEjMap[ej.id] || [];
      var resJug = null;
      for (var x = 0; x < resArr.length; x++) {
        if (resArr[x].email === email) { resJug = resArr[x]; break; }
      }
      var targets = targetsMap[ej.id] || [];
      var exig = ej.exigPct ? Math.round((ej.ammo || 0) * parseFloat(ej.exigPct)) : 0;

      if (!resJug) {
        html += '<td colspan="' + (targets.length || 1) + '" class="val-empty">—</td>';
      } else {
        var tarRes = resultadosTarMap[resJug.idResultado] || [];
        if (targets.length === 0) {
          var total = tarRes.reduce(function(s, t) { return s + (Number(t.aciertos) || 0); }, 0);
          var cls = exig > 0 ? (total >= exig ? 'val-ok' : total >= exig * 0.7 ? 'val-warn' : 'val-bad') : '';
          html += '<td class="' + cls + '">' + (total || '—') + '</td>';
        } else {
          targets.forEach(function(tar, tidx) {
            var tr2 = tarRes[tidx];
            var ac = tr2 ? tr2.aciertos : '';
            var tarExig = tar.ammo ? Math.round(tar.ammo * parseFloat(ej.exigPct || 0)) : 0;
            var cls2 = tarExig > 0 ? (Number(ac) >= tarExig ? 'val-ok' : Number(ac) >= tarExig * 0.7 ? 'val-warn' : 'val-bad') : '';
            html += '<td class="' + cls2 + '">' + (ac !== '' && ac !== null ? ac : '—') + '</td>';
          });
        }
      }
    });
    html += '</tr>';
  });

  html += '</table></div>';
  return html;
}

// ── JUGADORES ──
function loadJugadores() {
  apiCall("getJugadores")
    .then(function(data) {
      var cont = document.getElementById('jugadores-grid');
      if (!data.jugadores) return;
      cont.innerHTML = '<div class="jugador-grid">' +
        data.jugadores.map(function(j) {
          return '<button class="jugador-btn" onclick="loadHistorial(\'' + j.email + '\', this)">' + j.codigo + '</button>';
        }).join('') + '</div>';
    });
}

function loadHistorial(email, el) {
  document.querySelectorAll('.jugador-btn').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  var cont = document.getElementById('historial-jugador');
  cont.innerHTML = '<div class="loading">Cargando historial</div>';
  apiCallWithParam("getHistorialJugador", "email", email)
    .then(function(data) {
      if (!data.historial || data.historial.length === 0) {
        cont.innerHTML = '<div class="empty-msg">Sin resultados registrados</div>';
        return;
      }
      var total = data.historial.length;
      var cumple = data.historial.filter(function(h) { return h.cumple === true; }).length;
      var pct = total > 0 ? Math.round(cumple / total * 100) : 0;

      var html = '<div class="section-title">Historial</div>';
      html += '<div class="stat-row">';
      html += '<div class="stat-box navy"><div class="stat-val">' + total + '</div><div class="stat-lbl">Ejercicios registrados</div></div>';
      html += '<div class="stat-box green"><div class="stat-val green">' + cumple + '</div><div class="stat-lbl">Sobre exigencia</div></div>';
      html += '<div class="stat-box ' + (pct >= 70 ? 'green' : 'orange') + '"><div class="stat-val ' + (pct >= 70 ? 'green' : 'orange') + '">' + pct + '%</div><div class="stat-lbl">% cumplimiento</div></div>';
      html += '</div>';

      data.historial.forEach(function(h) {
        var scoreClass = h.cumple === true ? 'ok' : h.cumple === false ? 'bad' : 'warn';
        var isMojado = (h.tipo || '').toLowerCase().includes('mojado');
        html += '<div class="historial-ej">';
        html += '<div class="historial-ej-header">';
        html += '<span class="historial-fecha">' + h.fecha + '</span>';
        html += '<span class="historial-tipo">' + h.tipo + ' · ' + h.grupo + ' · Ej ' + h.numeroEj + '</span>';
        html += '<span class="badge ' + (isMojado ? 'badge-mojado' : 'badge-seco') + '">' + (h.tipo || '') + '</span>';
        html += '</div>';
        html += '<div class="historial-ej-body">';
        html += '<div class="historial-score ' + scoreClass + '">' + h.totalAciertos + '/' + h.ammo + '</div>';
        html += '<div><div class="historial-desc">' + (h.descripcion || '') + '</div>';
        html += '<div class="historial-exig">Exigencia: ' + h.exigNum + ' · ' + (h.ammo ? Math.round(h.exigNum / h.ammo * 100) : 0) + '%</div></div>';
        html += '</div></div>';
      });

      cont.innerHTML = html;
    });
}
</script>
</body>
</html>
